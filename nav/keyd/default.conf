[ids]
*

[main]
# Tap: Esc, hold: navigation layer.
capslock = overload(nav, esc)

[nav]
# Workspace navigation and overview/window switching.
h = C-A-left
l = C-A-right
j = leftmeta
k = A-tab

# Window management and focus, adapted from Hyper + YUIOP on macOS.
y = M-left
# Requires GNOME switch-windows-backward bound to Ctrl+Super+u.
u = C-M-u
# Requires GNOME switch-windows bound to Ctrl+Super+i.
i = C-M-i
o = M-right
p = M-up
